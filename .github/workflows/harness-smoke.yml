name: harness-smoke

# Кросс-платформенный смоук харнеса: POSIX-установка + Node-хуки на Linux,
# нативная install.ps1 + те же Node-хуки на Windows (это и есть настоящий
# Windows-прогон, ради которого хуки переписаны с sh на .mjs).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: smoke (sh + Node-хуки)
        run: sh harness/smoke/run.sh

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: smoke (install.ps1 + Node-хуки)
        shell: pwsh
        run: pwsh -File harness/smoke/run.ps1

  harness-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: harness unit-tests (node --test)
        run: node --test harness/test/*.test.mjs
      - name: skill-registry invariants (gen-skill-index --check)
        run: node harness/gen-skill-index.mjs --check
      - name: no projection drift (генераторы идемпотентны — проекции закоммичены)
        run: |
          node harness/gen-agents.mjs
          node harness/gen-skill-index.mjs
          git diff --exit-code

  component-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: component-tests (модели + прокси)
        run: sh component-tests/run.sh
